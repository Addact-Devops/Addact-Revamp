name: UAT Auto Deploy

on:
  push:
    branches:
      - uat

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Fix Git Safe Directory
        run: |
          git config --global --add safe.directory F:/Addact-Revamp

      - name: Pull latest code
        run: |
          Set-Location "F:\Addact-Revamp"
          git pull origin uat

      - name: Install Backend Dependencies
        run: |
          Set-Location "F:\Addact-Revamp\addact-cms"
          npm install

      - name: Install Frontend Dependencies
        run: |
          Set-Location "F:\Addact-Revamp\addact"
          npm install

      - name: Build Frontend
        run: |
          Set-Location "F:\Addact-Revamp\addact"
          npm run build

      - name: Restart Backend
        run: |
          taskkill /F /IM node.exe
          Start-Process cmd -ArgumentList '/c cd /d F:\Addact-Revamp\addact-cms && npm start'