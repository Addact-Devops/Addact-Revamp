name: UAT Auto Deploy

on:
  push:
    branches:
      - uat
    paths:
      - 'addact/**'
      - 'addact-cms/**'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 🔧 Fix Git permission issue
      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory F:/Addact-Revamp

      # 🔄 Pull latest code
      - name: Pull latest code
        run: |
          Set-Location "F:\Addact-Revamp"
          git pull origin uat

      # 🔍 Detect changes (FIXED)
      - name: Detect Changes
        id: changes
        run: |
          Set-Location "F:\Addact-Revamp"
          if (git rev-parse HEAD~1 2>$null) {
            git diff --name-only HEAD~1 HEAD > changes.txt
          } else {
            git ls-files > changes.txt
          }
          Get-Content changes.txt

      # =========================
      # 🔹 BACKEND
      # =========================

      - name: Check Backend Changes
        id: backend_check
        run: |
          Set-Location "F:\Addact-Revamp"
          if (Select-String -Path changes.txt -Pattern "addact-cms/") {
            echo "backend_changed=true" >> $env:GITHUB_OUTPUT
          }

      - name: Install Backend Dependencies
        if: steps.backend_check.outputs.backend_changed == 'true'
        run: |
          Set-Location "F:\Addact-Revamp\addact-cms"
          npm install

      - name: Restart Backend
        if: steps.backend_check.outputs.backend_changed == 'true'
        run: |
          $pids = netstat -aon | Select-String ":1339" | ForEach-Object { ($_ -split "\s+")[-1] }
          foreach ($pid in $pids) { taskkill /F /PID $pid }
          Start-Process cmd -ArgumentList '/c cd /d F:\Addact-Revamp\addact-cms && npm run develop'

      # =========================
      # 🔹 FRONTEND
      # =========================

      - name: Check Frontend Changes
        id: frontend_check
        run: |
          Set-Location "F:\Addact-Revamp"
          if (Select-String -Path changes.txt -Pattern "addact/") {
            echo "frontend_changed=true" >> $env:GITHUB_OUTPUT
          }

      - name: Install Frontend Dependencies
        if: steps.frontend_check.outputs.frontend_changed == 'true'
        run: |
          Set-Location "F:\Addact-Revamp\addact"
          npm install

      - name: Build Frontend
        if: steps.frontend_check.outputs.frontend_changed == 'true'
        run: |
          Set-Location "F:\Addact-Revamp\addact"
          npm run build

      - name: Restart Frontend
        if: steps.frontend_check.outputs.frontend_changed == 'true'
        run: |
          $pids = netstat -aon | Select-String ":3001" | ForEach-Object { ($_ -split "\s+")[-1] }
          foreach ($pid in $pids) { taskkill /F /PID $pid }
          Start-Process cmd -ArgumentList '/c cd /d F:\Addact-Revamp\addact && npm run start'