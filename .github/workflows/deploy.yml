name: UAT Frontend Deploy

on:
  push:
    branches:
      - uat
    paths:
      - 'addact/**'

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # =========================
      # 🔹 SAFE CODE SYNC
      # =========================
      - name: Sync Code Safely
        run: |
          Set-Location "F:\Addact-Revamp"
          git config --global --add safe.directory F:/Addact-Revamp
          git fetch origin uat
          git reset --hard origin/uat
          git clean -fd

      # =========================
      # 🔹 CHECK FRONTEND CHANGES
      # =========================
      - name: Detect Frontend Changes
        id: frontend_check
        run: |
          Set-Location "F:\Addact-Revamp"
          if (git rev-parse HEAD~1 2>$null) {
            git diff --name-only HEAD~1 HEAD > changes.txt
          } else {
            git ls-files > changes.txt
          }

          if (Select-String -Path changes.txt -Pattern "addact/") {
            echo "frontend_changed=true" >> $env:GITHUB_OUTPUT
          }

      # =========================
      # 🔹 INSTALL + BUILD
      # =========================
      - name: Build Frontend
        if: steps.frontend_check.outputs.frontend_changed == 'true'
        run: |
          Set-Location "F:\Addact-Revamp\addact"
          npm ci
          npm run build

      # =========================
      # 🔹 RESTART SERVICE
      # =========================
      - name: Restart Frontend
        if: steps.frontend_check.outputs.frontend_changed == 'true'
        run: |
          nssm restart addact-frontend