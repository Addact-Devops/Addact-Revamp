<!DOCTYPE html>
<html>
<head>
    <title>SEO Power Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --panel: rgba(17, 24, 39, 0.7);
            --primary: #10b981;
            --secondary: #6366f1;
            --border: rgba(255, 255, 255, 0.08);
            --text: #f3f4f6;
            --text-dim: #9ca3af;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            min-height: 100vh;
            background-image: radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.05) 0%, transparent 50%);
            padding: 40px; 
            background-attachment: fixed;
        }
        .container { max-width: 100%; margin: 0 auto; }
        header { margin-bottom: 40px; }
        h1 { 
            font-size: 2.5rem; 
            font-weight: 800; 
            margin: 0; 
            background: linear-gradient(to right, #fff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .dashboard { display: grid; grid-template-columns: 320px 1fr; gap: 30px; align-items: start; }
        .panel { 
            background: var(--panel); 
            backdrop-filter: blur(12px); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 30px;
            box-shadow: 0 10px 30px -5px rgba(0,0,0,0.3);
        }
        h2 { font-size: 1.1rem; font-weight: 700; margin-top: 0; margin-bottom: 20px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        h2::before { content: ''; width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); }
        .form-group { margin-bottom: 25px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; letter-spacing: 0.05em; }
        select, input[type="text"], input[type="password"] { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 12px; 
            padding: 12px; color: #fff; font-size: 0.9rem; outline: none; transition: all 0.2s;
        }
        select:focus, input:focus { border-color: var(--secondary); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        .toggle-group { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px; }
        .toggle-group input { margin: 0; }
        .btn { 
            width: 100%; padding: 14px; border: none; border-radius: 14px; font-weight: 700; font-size: 0.9rem;
            cursor: pointer; transition: all 0.2s; margin-bottom: 12px; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--primary); color: #000; box-shadow: 0 4px 15px -3px rgba(16, 185, 129, 0.4); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -5px rgba(16, 185, 129, 0.5); }
        .btn-secondary { background: transparent; color: #fff; border: 1px solid var(--border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; margin-top: 10px; display: none; }
        .progress-inner { height: 100%; background: linear-gradient(to right, var(--primary), var(--secondary)); width: 0%; transition: width 0.3s; }
        .table-container { overflow: hidden; border-radius: 16px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(255,255,255,0.02); padding: 16px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }
        td { padding: 20px 16px; border-top: 1px solid var(--border); vertical-align: top; }
        .type-row:hover { background: rgba(255,255,255,0.01); }
        .type-uid { font-weight: 700; font-size: 0.95rem; color: #fff; }
        .entry-details { 
            margin-top: 15px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 12px; 
            max-height: 300px; 
            overflow-y: auto; 
            padding: 10px;
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
        }
        .entry-details::-webkit-scrollbar { width: 4px; }
        .entry-details::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .entry-card { background: rgba(0,0,0,0.2); padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.03); display: flex; flex-direction: column; gap: 4px; }
        .entry-title { font-size: 0.8rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-weight: 700; width: fit-content; text-transform: uppercase; }
        .badge-index { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .badge-noindex { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-follow { background: rgba(99, 102, 241, 0.15); color: #6366f1; border: 1px solid rgba(99, 102, 241, 0.3); }
        .badge-nofollow { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-na { background: rgba(156, 163, 175, 0.15); color: #9ca3af; border: 1px solid rgba(156, 163, 175, 0.3); }
        .count-badge { background: var(--secondary); color: #fff; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; }
        #logModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-content {
            background: #111827;
            border: 1px solid var(--border);
            border-radius: 24px;
            width: 80%;
            max-width: 800px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; flex-grow: 1; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: #d1d5db; }
        .modal-footer { padding: 15px; border-top: 1px solid var(--border); text-align: right; display: none; }
        .close-btn { background: var(--primary); color: #000; border: none; padding: 10px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div id="logModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 style="margin:0">Operation Progress</h3>
                <div id="modalStatus" style="font-size: 0.8rem; color: var(--text-dim)">Processing...</div>
            </div>
            <div class="modal-body" id="modalLog"></div>
            <div class="modal-footer" id="modalFooter">
                <button class="close-btn" type="button" id="closeModal">Dismiss</button>
            </div>
        </div>
    </div>
    <div class="container">
        <header><h1>SEO Bulk Power Tool</h1></header>
        <div class="dashboard">
            <aside class="panel">
                <h2>Configuration</h2>
                <div class="form-group">
                    <label>Strapi API Token</label>
                    <input type="password" id="api-token" placeholder="Paste your API Token here...">
                    <button id="validate-btn" type="button" class="btn btn-secondary" style="margin-top: 10px;">Validate Token</button>
                    <small style="color: var(--text-dim); font-size: 0.7rem; margin-top: 5px; display: block;">Get token from Settings > API Tokens</small>
                </div>
                <div id="controls" style="display: none;">
                    <div class="form-group">
                        <label>Target metaRobots Value</label>
                        <select id="meta-value"></select>
                    </div>
                    <div class="form-group">
                        <label class="toggle-group"><input type="checkbox" id="dry-run" checked> Dry Run Pattern</label>
                        <label class="toggle-group"><input type="checkbox" id="auto-publish"> Auto-Publish Changes</label>
                    </div>
                    <button id="run-btn" type="button" class="btn btn-primary">Execute Update</button>
                    <button id="refresh-btn" type="button" class="btn btn-secondary">Refresh Data</button>
                    <div class="progress-bar" id="progress-container"><div class="progress-inner" id="progress-bar"></div></div>
                </div>
            </aside>
            <main class="panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h2>Content Types <span id="select-count" style="margin-left: 15px; font-size: 0.8rem; background: var(--border); padding: 4px 12px; border-radius: 20px; color: var(--text-dim); text-transform: none;">0 selected</span></h2>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th style="width: 40px;"><input type="checkbox" id="select-all"></th><th>Type Details & Current State</th><th style="width: 120px;">Kind</th></tr></thead>
                        <tbody id="type-list">
                            <tr><td colspan="3" style="text-align:center; padding: 60px; color: var(--text-dim);">Enter a token and click <b>Validate</b> to begin.</td></tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>
    <script>
        console.log('SEO Tool Script Loading...');
        const els = {
            runBtn: document.getElementById('run-btn'),
            refreshBtn: document.getElementById('refresh-btn'),
            validateBtn: document.getElementById('validate-btn'),
            controls: document.getElementById('controls'),
            typeList: document.getElementById('type-list'),
            progressBar: document.getElementById('progress-bar'),
            progressCont: document.getElementById('progress-container'),
            logModal: document.getElementById('logModal'),
            modalLog: document.getElementById('modalLog'),
            modalFooter: document.getElementById('modalFooter'),
            closeModal: document.getElementById('closeModal'),
            modalStatus: document.getElementById('modalStatus'),
            selectAll: document.getElementById('select-all'),
            selectCount: document.getElementById('select-count'),
            meta: document.getElementById('meta-value'),
            dryRun: document.getElementById('dry-run'),
            autoPublish: document.getElementById('auto-publish'),
            apiToken: document.getElementById('api-token')
        };
        let types = [];
        els.apiToken.value = sessionStorage.getItem('seo_power_token') || '';
        function getHeaders() {
            const token = els.apiToken.value.trim();
            sessionStorage.setItem('seo_power_token', token);
            return {
                'Content-Type': 'application/json',
                'Authorization': token ? 'Bearer ' + token : ''
            };
        }
        function getBadgeClass(val) {
            val = val.toLowerCase();
            if (val.includes('noindex')) return 'badge-noindex';
            if (val.includes('index')) return 'badge-index';
            if (val.includes('nofollow')) return 'badge-nofollow';
            if (val.includes('follow')) return 'badge-follow';
            return 'badge-na';
        }
        function log(msg, color = 'var(--text-dim)') {
            const time = new Date().toLocaleTimeString().toLowerCase();
            const html = '<div style="margin-bottom:6px; color:' + color + '"><span style="color:#6b7280; margin-right:8px">' + time + '</span> ' + msg + '</div>';
            els.modalLog.innerHTML += html;
            els.modalLog.scrollTop = els.modalLog.scrollHeight;
        }
        async function fetchTypes() {
            if (!els.apiToken.value) return;
            console.log('Fetching types...');
            els.validateBtn.disabled = true;
            els.validateBtn.innerText = 'Validating...';
            try {
                const res = await fetch('types', { headers: getHeaders() });
                if (res.status === 401 || res.status === 403) {
                    els.typeList.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 40px; color: var(--danger);">Invalid Token.</td></tr>';
                    els.controls.style.display = 'none';
                    return;
                }
                const data = await res.json();
                if (data.error) { alert('Error: ' + data.error); return; }
                types = data.types || [];
                els.controls.style.display = 'block';
                if (data.enumValues) {
                    els.meta.innerHTML = data.enumValues.map(v => '<option value="' + v + '">' + v + '</option>').join('');
                }
                els.typeList.innerHTML = (types.length ? types.map((t, idx) => {
                    const entrySummary = t.entries.map(e => 
                        '<div class="entry-card">' +
                            '<span class="entry-title" title="' + (e.slug || e.title) + '">' + (e.slug || e.title || 'Untitled') + '</span>' +
                            '<span class="badge ' + getBadgeClass(e.metaRobots) + '">' + e.metaRobots + '</span>' +
                        '</div>'
                    ).join('');
                    return '<tr>' +
                        '<td><input type="checkbox" class="t-check" data-uid="' + t.uid + '" data-seo="' + t.seoFieldName + '" data-kind="' + t.kind + '"></td>' +
                        '<td><div class="type-uid">' + t.uid + ' <span class="count-badge">' + t.count + '</span></div><div class="entry-details">' + entrySummary + '</div></td>' +
                        '<td>' + t.kind + '</td>' +
                    '</tr>';
                }).join('') : '<tr><td colspan="3" style="text-align:center; padding: 40px;">No SEO entities found.</td></tr>');
            } catch (err) { alert('API Error: ' + err.message); }
            finally {
                els.validateBtn.disabled = false;
                els.validateBtn.innerText = 'Validate Token';
            }
        }
        els.selectAll.addEventListener('change', (e) => {
            document.querySelectorAll('.t-check').forEach(c => c.checked = e.target.checked);
            els.selectCount.innerText = document.querySelectorAll('.t-check:checked').length + ' selected';
        });
        els.closeModal.addEventListener('click', () => { els.logModal.style.display = 'none'; els.modalLog.innerHTML = ''; });
        els.apiToken.addEventListener('keypress', (e) => { if (e.key === 'Enter') fetchTypes(); });
        els.validateBtn.addEventListener('click', fetchTypes);
        els.refreshBtn.addEventListener('click', fetchTypes);
        els.runBtn.addEventListener('click', async () => {
            const selected = Array.from(document.querySelectorAll('.t-check:checked')).map(c => ({ 
                uid: c.dataset.uid, seoFieldName: c.dataset.seo, kind: c.dataset.kind 
            }));
            if (selected.length === 0) return alert('Select schemas.');
            els.runBtn.disabled = true; els.logModal.style.display = 'flex';
            log('Starting...');
            for (let i = 0; i < selected.length; i++) {
                const t = selected[i];
                log('Processing ' + t.uid + '...');
                try {
                    const res = await fetch('update', {
                        method: 'POST',
                        headers: getHeaders(),
                        body: JSON.stringify({ type: t, value: els.meta.value, dryRun: els.dryRun.checked, autoPublish: els.autoPublish.checked })
                    });
                    const resData = await res.json();
                    if (resData.success) log('\u2714 Done: ' + t.uid, '#10b981');
                    else log('\u2716 Error: ' + t.uid, '#ef4444');
                } catch (e) { log('\u2716 Fatal: ' + e.message, '#ef4444'); }
            }
            log('Finished.', '#6366f1');
            els.modalFooter.style.display = 'block';
            els.runBtn.disabled = false;
        });
        if (els.apiToken.value) fetchTypes();
    </script>
</body></html>
